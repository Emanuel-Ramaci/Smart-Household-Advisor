<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
  <head>
    <link rel="stylesheet" href="/css/style.css" />
    <meta charset="UTF-8" />
    <title>Households Management Page | Smart Household Advisor</title>
  </head>
  <body>
    <div class="top-bar">
      <div class="left-buttons">
        <button class="home-btn" onclick="window.location.href = '/home'">
          🏠 Home
        </button>
      </div>
      <div class="right-buttons">
        <button id="logoutBtn" class="logout-btn">⎋ Logout</button>
      </div>
    </div>
    <h2>Gestione delle tue Household</h2>
    <p>ID Utente: <span id="userId" th:text="${userId}"></span></p>

    <h3>Aggiungi una nuova Household</h3>
    <form id="addHouseholdForm" class="animate-in">
      <input
        type="hidden"
        id="userIdInput"
        name="userId"
        th:value="${userId}"
      />

      <label>Nome:</label>
      <input type="text" id="name" name="name" required /><br />

      <label>Indirizzo:</label>
      <input type="text" id="address" name="address" required /><br />

      <label>Città:</label>
      <input type="text" id="city" name="city" /><br />

      <label>Codice Postale:</label>
      <input type="text" id="postalCode" name="postalCode" /><br />

      <label>Metri quadri:</label>
      <input
        type="number"
        id="squareMeters"
        name="squareMeters"
        step="0.01"
      /><br />

      <label>Classe energetica:</label>
      <input type="text" id="energyClass" name="energyClass" /><br />

      <label>Tariffa energetica (€/kWh):</label>
      <input
        type="number"
        id="energyTariff"
        name="energyTariff"
        step="0.01"
      /><br />

      <label>Numero di residenti:</label>
      <input type="number" id="residentsCount" name="residentsCount" /><br />

      <button type="submit">Crea Household</button>
    </form>
    <p id="addedHouseholdResult"></p>
    <hr />

    <h3>Le tue Household</h3>
    <table border="1" id="householdTable" class="animate-in">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Indirizzo</th>
          <th>Metri quadri</th>
          <th>Classe energetica</th>
          <th>Tariffa energetica</th>
          <th>Numero di residenti</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="/js/households.js"></script>
    <script src="/js/logout.js"></script>
  </body>
</html>
