<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
  <head>
    <link rel="stylesheet" href="/css/style.css" />
    <meta charset="UTF-8" />
    <title>Energy Consumptions Page | Smart Household Advisor</title>
  </head>
  <body>
    <div class="top-bar">
      <div class="left-buttons">
        <button class="home-btn" onclick="window.location.href = '/home'">
          🏠 Home
        </button>
      </div>
      <div class="right-buttons">
        <button id="logoutBtn" class="logout-btn">⎋ Logout</button>
      </div>
    </div>
    <h2>Consumi energetici della tua Household</h2>
    <p>ID Household: <span id="householdId" th:text="${householdId}"></span></p>

    <h3>Aggiungi un nuovo consumo energetico per la tua abitazione</h3>
    <form id="addEnergyConsumptionForm" class="animate-in">
      <label>Categoria:</label>
      <input type="text" id="category" required /><br />

      <label>Consumo in kWh:</label>
      <input type="number" id="consumptionKwh" step="0.1" required /><br />

      <label>Data di riferimento:</label>
      <input
        type="text"
        id="referenceDate"
        pattern="\d{2}-\d{2}-\d{4}"
        placeholder="gg-MM-aaaa"
        required
      /><br />

      <button type="submit">Aggiungi consumo energetico</button>
    </form>
    <p id="addedEnergyConsumptionResult"></p>
    <hr />

    <h3>Consumi energetici recenti</h3>
    <table border="1" id="allEnergyConsumptions" class="animate-in">
      <thead>
        <tr>
          <th>#</th>
          <th>Categoria</th>
          <th>Consumo energetico (kWh)</th>
          <th>Data di riferimento</th>
          <th>Dettagli</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="/js/consumptions.js"></script>
    <script src="/js/logout.js"></script>
  </body>
</html>
