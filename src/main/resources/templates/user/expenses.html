<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
  <head>
    <link rel="stylesheet" href="/css/style.css" />
    <meta charset="UTF-8" />
    <title>Expenses Page | Smart Household Advisor</title>
  </head>
  <body>
    <div class="top-bar">
      <div class="left-buttons">
        <button class="home-btn" onclick="window.location.href = '/home'">
          🏠 Home
        </button>
      </div>
      <div class="right-buttons">
        <button id="logoutBtn" class="logout-btn">⎋ Logout</button>
      </div>
    </div>
    <h2>Spese della tua Household</h2>
    <p>ID Household: <span id="householdId" th:text="${householdId}"></span></p>

    <h3>Aggiungi una nuova spesa per la tua abitazione</h3>
    <form id="addExpenseForm" class="animate-in">
      <label>Categoria:</label>
      <input type="text" id="category" required /><br />

      <label>Spesa (€):</label>
      <input type="number" id="amount" step="0.01" required /><br />

      <label>Data di riferimento:</label>
      <input
        type="text"
        id="referenceDate"
        pattern="\d{2}-\d{2}-\d{4}"
        placeholder="gg-MM-aaaa"
        required
      /><br />

      <label>Descrizione:</label>
      <input type="text" id="description" required /><br />

      <button type="submit">Aggiungi spesa</button>
    </form>
    <p id="addedExpenseResult"></p>
    <hr />

    <h3>Spese recenti</h3>
    <table border="1" id="allExpenses" class="animate-in">
      <thead>
        <tr>
          <th>#</th>
          <th>Categoria</th>
          <th>Spesa (€)</th>
          <th>Data di riferimento</th>
          <th>Descrizione</th>
          <th>Dettagli</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="/js/expenses.js"></script>
    <script src="/js/logout.js"></script>
  </body>
</html>
