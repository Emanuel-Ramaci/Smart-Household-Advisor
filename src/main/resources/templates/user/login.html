<!doctype html>
<html lang="it">
  <head>
    <link rel="stylesheet" href="/css/style.css" />
    <meta charset="UTF-8" />
    <title>User Login Page | Smart Household Advisor</title>
  </head>
  <body>
    <div class="center-page animate-in">
      <h1>Smart Household Advisor</h1>
      <h2>Login User</h2>

      <form id="loginForm" class="animate-in">
        <label>Email:</label>
        <input type="email" id="email" required /><br />

        <label>Password:</label>
        <input type="password" id="password" required /><br />

        <button type="submit">Login</button>
      </form>

      <p style="color: red">
        <span id="errorMsg"></span>
      </p>

      <form action="/register" method="get" class="animate-in">
        <button type="submit">Registrati</button>
      </form>
      <button type="button" onclick="window.location.href = '/admin-login'">
        Login Admin
      </button>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
