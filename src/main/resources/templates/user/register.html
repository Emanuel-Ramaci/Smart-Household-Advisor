<!doctype html>
<html lang="it">
  <head>
    <link rel="stylesheet" href="/css/style.css" />
    <meta charset="UTF-8" />
    <title>User Registration Page | Smart Household Advisor</title>
  </head>
  <body>
    <div class="center-page animate-in" style="margin-bottom: -100px">
      <h1>Smart Household Advisor</h1>
      <h2>Registrazione</h2>

      <form id="registerForm" class="animate-in">
        <label>Email:</label>
        <input type="email" id="email" required /><br /><br />

        <label>Nome:</label>
        <input type="text" id="firstName" required /><br /><br />

        <label>Cognome:</label>
        <input type="text" id="lastName" required /><br /><br />

        <label>Password:</label>
        <input type="password" id="password" required /><br /><br />

        <button type="submit">Registrati</button>
      </form>

      <p
        id="msg"
        style="
          color: red;
          position: absolute;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
        "
      ></p>
    </div>

    <form action="/user-login" method="get" class="animate-in">
      <button type="submit" style="margin-top: 5px">Torna al Login</button>
    </form>

    <script src="/js/register.js"></script>
  </body>
</html>
